<style>
  html { scrollbar-gutter: stable; }
  html, body { font-family:'Cairo', sans-serif; background:#fff; overscroll-behavior-y: none; }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  .scrollbar-hide::-webkit-scrollbar { display:none; }
  .scrollbar-hide { -ms-overflow-style:none; scrollbar-width:none; }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.06); overflow-x: hidden; position: relative; }
  input, textarea, button { font-family:'Cairo', sans-serif; }

  /* ── معايير احترافية موحّدة لكل الأزرار (إدارة / عميل / سائق) ── */
  button { transition: transform .15s ease, opacity .15s ease, background-color .15s ease, box-shadow .15s ease; -webkit-user-select: none; user-select: none; }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
  button:focus-visible { outline: 2px solid rgba(10,10,10,.45); outline-offset: 2px; }

  /* ── منع خروج أي نص عن حدود الشاشة أو الحقول ── */
  body, #root, main, header, nav, div, p, span, h1, h2, h3 { min-width: 0; }
  p, span, h1, h2, h3 { overflow-wrap: anywhere; word-break: break-word; }
  input, textarea { min-width: 0; max-width: 100%; }

  /* ── متغيرات الحدود (تتبدّل تلقائياً مع الوضع الليلي) ── */
  :root{
    --bc-a:#EFEFEF; --bc-b:#E8E8E8; --bc-c:#F5F5F5; --bc-d:#F0F0F0; --bc-e:#F8F8F8;
    --ink:#0A0A0A; --app-bg:#FAFAFA;
  }
  [data-theme="dark"]{
    --bc-a:#2A2A2E; --bc-b:#323236; --bc-c:#242428; --bc-d:#242428; --bc-e:#242428;
    --ink:#FAFAFA; --app-bg:#0A0A0A; color-scheme: dark;
  }

  /* ── الوضع الليلي: تعطيل ألوان Tailwind الفاتحة تلقائياً عبر كل الشاشات ── */
  [data-theme="dark"] body { background:#0A0A0A; }
  [data-theme="dark"] #root { background:#0A0A0A; box-shadow: 0 0 60px rgba(0,0,0,0.4); }
  [data-theme="dark"] .bg-white { background-color:#151517 !important; }
  [data-theme="dark"] .bg-gray-50 { background-color:#1C1C1F !important; }
  [data-theme="dark"] .bg-gray-100 { background-color:#242428 !important; }
  [data-theme="dark"] .bg-gray-150 { background-color:#2A2A2E !important; }
  [data-theme="dark"] .bg-gray-200 { background-color:#323236 !important; }
  [data-theme="dark"] .text-gray-950 { color:#FAFAFA !important; }
  [data-theme="dark"] .text-gray-900 { color:#F4F4F5 !important; }
  [data-theme="dark"] .text-gray-700 { color:#D4D4D8 !important; }
  [data-theme="dark"] .text-gray-600 { color:#B8B8BF !important; }
  [data-theme="dark"] .text-gray-500 { color:#9A9AA2 !important; }
  [data-theme="dark"] .text-gray-400 { color:#78787F !important; }
  [data-theme="dark"] .text-gray-300 { color:#57575D !important; }
  [data-theme="dark"] .border, [data-theme="dark"] .border-2, [data-theme="dark"] .border-t,
  [data-theme="dark"] .border-b, [data-theme="dark"] .border-y { border-color:#26262A; }
  [data-theme="dark"] .bg-green-50 { background-color:rgba(34,197,94,0.12) !important; }
  [data-theme="dark"] .bg-blue-50 { background-color:rgba(59,130,246,0.12) !important; }
  [data-theme="dark"] .bg-red-50 { background-color:rgba(239,68,68,0.12) !important; }
  [data-theme="dark"] .bg-amber-50 { background-color:rgba(245,158,11,0.12) !important; }
  [data-theme="dark"] .border-green-100 { border-color:rgba(34,197,94,0.25) !important; }
  [data-theme="dark"] .border-blue-100 { border-color:rgba(59,130,246,0.25) !important; }
  [data-theme="dark"] .border-red-100 { border-color:rgba(239,68,68,0.25) !important; }
  [data-theme="dark"] .text-green-700, [data-theme="dark"] .text-green-800, [data-theme="dark"] .text-green-900,
  [data-theme="dark"] .text-green-600 { color:#4ADE80 !important; }
  [data-theme="dark"] .text-blue-900, [data-theme="dark"] .text-blue-600, [data-theme="dark"] .text-blue-500 { color:#60A5FA !important; }
  [data-theme="dark"] .text-red-600, [data-theme="dark"] .text-red-800, [data-theme="dark"] .text-red-500 { color:#F87171 !important; }
  [data-theme="dark"] .text-amber-700 { color:#FBBF24 !important; }
  [data-theme="dark"] input, [data-theme="dark"] textarea { background:transparent; color:#FAFAFA; }
  [data-theme="dark"] input::placeholder, [data-theme="dark"] textarea::placeholder { color:#54545A; }
  [data-theme="dark"] .placeholder-gray-300::placeholder { color:#54545A !important; }

  /* ── سبلاش الشاشة الأولية ── */
  @keyframes moterFadeOut { 0%,70%{opacity:1} 100%{opacity:0} }
  @keyframes moterPop { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.06);opacity:1} 100%{transform:scale(1)} }
  .moter-splash { position:fixed; inset:0; z-index:100; background:#0A0A0A; display:flex; flex-direction:column;
    align-items:center; justify-content:center; animation:moterFadeOut 1.3s ease forwards; }
  .moter-splash-icon { animation:moterPop .6s ease; }

  /* ── مؤشر تحميل دوّار ── */
  @keyframes moterSpin { to { transform:rotate(360deg); } }
  .moter-spinner { display:inline-block; width:1em; height:1em; border:2.5px solid rgba(255,255,255,.35);
    border-top-color:#fff; border-radius:50%; animation:moterSpin .7s linear infinite; }
  .moter-spinner-dark { border:2.5px solid rgba(10,10,10,.2); border-top-color:#0A0A0A; }

  /* ── تنبيه خطأ التحقق من الحقول ── */
  .moter-field-error { color:#EF4444; font-size:12px; font-weight:700; margin-top:6px; display:flex; align-items:center; gap:4px; }
  [data-theme="dark"] .moter-field-error { color:#F87171; }

  /* ── نظام تتبّع الطلب بالخط الزمني (Timeline) — نبضة الخطوة الحالية ── */
  @keyframes moterTlPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(10,10,10,.16); } 50%{ box-shadow:0 0 0 7px rgba(10,10,10,0); } }
  .moter-tl-pulse { animation: moterTlPulse 1.8s ease-in-out infinite; }
  [data-theme="dark"] .moter-tl-pulse { animation-name: moterTlPulseDark; }
  @keyframes moterTlPulseDark { 0%,100%{ box-shadow:0 0 0 0 rgba(250,250,250,.14); } 50%{ box-shadow:0 0 0 7px rgba(250,250,250,0); } }

  /* ── تنبيهات Toast خفيفة ── */
  @keyframes moterToastIn { 0%{ transform:translateY(14px) scale(.96); opacity:0; } 100%{ transform:translateY(0) scale(1); opacity:1; } }
  .moter-toast { animation: moterToastIn .28s cubic-bezier(.2,.8,.3,1); }

  /* ── هياكل تحميل (Skeleton) ── */
  @keyframes moterShimmer { 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
  .moter-skeleton { background:linear-gradient(90deg, #EDEDED 25%, #F6F6F6 37%, #EDEDED 63%); background-size:400% 100%;
    animation:moterShimmer 1.4s ease infinite; border-radius:12px; }
  [data-theme="dark"] .moter-skeleton { background:linear-gradient(90deg, #242428 25%, #2C2C30 37%, #242428 63%); background-size:400% 100%; }

  /* ══════════════════════════════════════════════════════════════════
     REFINEMENT PASS — same neutral palette, elevated precision.
     Pure additions: new tokens + selectors on existing class combos.
     Nothing below overrides component logic or removes a rule above.
  ══════════════════════════════════════════════════════════════════ */

  :root{
    --ease-premium: cubic-bezier(.16,1,.3,1);
    --shadow-xs:    0 1px 2px rgba(10,10,10,.05);
    --shadow-card:      0 1px 2px rgba(10,10,10,.04), 0 10px 26px -14px rgba(10,10,10,.14);
    --shadow-card-hover:0 1px 2px rgba(10,10,10,.05), 0 16px 36px -14px rgba(10,10,10,.20);
    --shadow-float: 0 4px 10px rgba(10,10,10,.10), 0 26px 50px -16px rgba(10,10,10,.26);
    --shadow-btn:       0 1px 2px rgba(10,10,10,.08), 0 8px 18px -7px rgba(10,10,10,.32);
    --grad-ink: linear-gradient(180deg, #17181D 0%, #0A0A0A 100%);
  }
  [data-theme="dark"]{
    --shadow-xs:    0 1px 2px rgba(0,0,0,.35);
    --shadow-card:      0 1px 2px rgba(0,0,0,.3), 0 10px 26px -14px rgba(0,0,0,.55);
    --shadow-card-hover:0 1px 2px rgba(0,0,0,.3), 0 16px 36px -14px rgba(0,0,0,.6);
    --shadow-float: 0 4px 10px rgba(0,0,0,.45), 0 28px 54px -16px rgba(0,0,0,.75);
    --shadow-btn:       0 1px 2px rgba(0,0,0,.3), 0 10px 22px -7px rgba(0,0,0,.55);
    --grad-ink: linear-gradient(180deg, #1E1F24 0%, #0E0E10 100%);
  }

  /* every white card/panel gets real, soft elevation instead of a flat border */
  .bg-white.border.rounded-2xl, .bg-white.border.rounded-3xl,
  .bg-white.rounded-2xl.border, .bg-white.rounded-3xl.border,
  .bg-white.rounded-2xl.overflow-hidden.border, .bg-white.rounded-xl.border {
    box-shadow: var(--shadow-card);
    transition: box-shadow .28s var(--ease-premium), transform .28s var(--ease-premium);
  }
  [data-theme="dark"] .bg-white.border.rounded-2xl, [data-theme="dark"] .bg-white.border.rounded-3xl,
  [data-theme="dark"] .bg-white.rounded-2xl.border, [data-theme="dark"] .bg-white.rounded-3xl.border,
  [data-theme="dark"] .bg-white.rounded-2xl.overflow-hidden.border, [data-theme="dark"] .bg-white.rounded-xl.border {
    box-shadow: var(--shadow-card);
  }

  /* primary black actions: quiet luminance gradient + a real shadow instead of flat ink */
  button.bg-gray-950.text-white, a.bg-gray-950.text-white {
    background-image: var(--grad-ink);
    box-shadow: var(--shadow-btn);
  }
  button.bg-gray-950.text-white:active, a.bg-gray-950.text-white:active { box-shadow: var(--shadow-xs); }

  /* sheets + confirm dialogs float with real depth above the scrim */
  .fixed.inset-0.z-50 .rounded-3xl, .fixed.inset-0 .rounded-3xl { box-shadow: var(--shadow-float); }

  /* quiet fade + rise on every screen change, app-wide (see key={view} on shell wrappers) */
  @keyframes moterViewEnter { from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }
  .view-transition { animation: moterViewEnter .42s var(--ease-premium); }

  /* staggered entrance for the role picker on the welcome screen */
  @keyframes moterRoleIn { from{ opacity:0; transform:translateY(14px) scale(.98);} to{ opacity:1; transform:translateY(0) scale(1);} }
  .role-stagger button { animation: moterRoleIn .5s var(--ease-premium) backwards; }
  .role-stagger button:nth-of-type(1){ animation-delay:.05s; }
  .role-stagger button:nth-of-type(2){ animation-delay:.13s; }
  .role-stagger button:nth-of-type(3){ animation-delay:.21s; }

  /* more considered splash: soft depth on the mark, gentle text rise */
  .moter-splash-icon { box-shadow: 0 20px 44px -12px rgba(0,0,0,.55); }
  @keyframes moterTextIn { from{ opacity:0; transform:translateY(7px);} to{ opacity:1; transform:translateY(0);} }
  .moter-splash h1 { animation: moterTextIn .5s var(--ease-premium) .22s backwards; }

  /* subtle precision: crisper focus ring, calmer disabled state */
  button:focus-visible, a:focus-visible { outline-offset: 3px; }

  /* welcome hero: quiet radial depth behind the mark instead of a flat block */
  .hero-surface { position:relative; overflow:hidden; }
  .hero-surface::before {
    content:''; position:absolute; inset:-20% -20% auto -20%; height:75%;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.10), rgba(255,255,255,0) 68%);
    pointer-events:none;
  }
  .hero-surface > * { position:relative; }

  @media (prefers-reduced-motion: reduce){
    .view-transition, .role-stagger button, .moter-splash h1, .moter-splash-icon, .moter-tl-pulse { animation:none !important; }
  }
</style>

// ── دوال مساعدة: تحديد الموقع الجغرافي، حساب المسافة، والتسعير الحي ───────────
function resolveNeighborhood(name) {
  if (!name) return NEIGHBORHOODS[0];
  const trimmed = String(name).trim();
  const exact = NEIGHBORHOODS.find(n => n.name === trimmed);
  if (exact) return exact;
  const partial = NEIGHBORHOODS.find(n => trimmed.includes(n.name) || n.name.includes(trimmed));
  if (partial) return partial;
  let hash = 0;
  for (let i = 0; i < trimmed.length; i++) hash = (hash * 31 + trimmed.charCodeAt(i)) >>> 0;
  const latOffset = ((hash % 1000) / 1000 - 0.5) * 0.18;
  const lngOffset = (((hash >> 8) % 1000) / 1000 - 0.5) * 0.18;
  return { name: trimmed, lat: 15.55 + latOffset, lng: 32.53 + lngOffset };
}

function haversineKm(a, b) {
  if (!a || !b) return 0;
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
  const h = Math.sin(dLat/2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
}

function getPricingSettings() {
  return PRICING;
}

function calcDeliveryPrice(distanceKm, deliveryTypeId) {
  const pricing = getPricingSettings();
  const type = DELIVERY_TYPES.find(t => t.id === deliveryTypeId) || DELIVERY_TYPES[0];
  const raw = distanceKm * pricing.km * (type.multiplier || 1);
  return Math.max(Math.round(raw), pricing.min);
}

function applyPromoCode(amount, codeInput) {
  const clean = (codeInput || "").trim().toUpperCase();
  if (!clean) return { finalAmount: amount, discount: 0, error: null, label: null };
  const promo = PROMO_CODES.find(p => p.code === clean);
  if (!promo) return { finalAmount: amount, discount: 0, error: "كود الخصم غير صحيح", label: null };
  if (!promo.active) return { finalAmount: amount, discount: 0, error: "هذا الكود منتهي الصلاحية", label: null };
  const discount = promo.type === "percent" ? Math.round(amount * promo.value / 100) : promo.value;
  const finalAmount = Math.max(amount - discount, 0);
  return { finalAmount, discount, error: null, label: promo.label };
}

function driverStats(driverId, orders) {
  const mine = orders.filter(o => o.driverId === driverId && o.status === "delivered");
  const ratings = mine.map(o => o.rating).filter(Boolean);
  const rating = ratings.length ? (ratings.reduce((a,b)=>a+b,0) / ratings.length) : 5.0;
  const earnings = mine.reduce((s,o) => s + o.price, 0);
  return { deliveries: mine.length, earnings, rating: Math.round(rating * 10) / 10 };
}

function readLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function writeLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function useLocalStorageState(key, initial) {
  const [value, setValue] = useState(() => readLS(key, initial));
  useEffect(() => { writeLS(key, value); }, [key, value]);
  return [value, setValue];
}

// طبقة الحسابات/المصادقة — واجهة غير متزامنة بشكل الـ API الحقيقي (تأخير شبكة
// محاكى، تحقّق فعلي، أخطاء حقيقية) لتقوم مقام باكند حقيقي حتى ربطها بواحد فعلي
// (Firebase أو باكند Express/Postgres الخاص بك). كل الدوال async وتُرجع Promise
// تماماً كما لو كانت طلبات fetch حقيقية، فتبديل الداخل لاحقاً لا يغيّر بقية التطبيق.
// ══════════════════════════════════════════════════════════════════════════════
function apiDelay(ms) { return new Promise(res => setTimeout(res, ms)); }

function normalizePhone(phone) { return String(phone || "").trim().replace(/[\s-]/g, ""); }

async function hashSecret(text) {
  try {
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  } catch (e) {
    return "h_" + text.length + "_" + text; // احتياط بسيط لبيئات بلا Web Crypto
  }
}

function getAccounts() { return readLS(LS_ACCOUNTS, []); }
function saveAccounts(list) { writeLS(LS_ACCOUNTS, list); }

const authApi = {
  async register({ role, name, phone, password, photo, vehicle, plate }) {
    await apiDelay(700);
    const cleanPhone = normalizePhone(phone);
    const accounts = getAccounts();
    if (accounts.some(a => a.role === role && normalizePhone(a.phone) === cleanPhone)) {
      throw new Error("هذا الرقم مسجَّل بالفعل بحساب " + (role === "driver" ? "سائق" : "عميل") + "، جرّب تسجيل الدخول");
    }
    const passwordHash = await hashSecret(password);
    const account = {
      id: (role === "driver" ? "DRV-" : "CUS-") + Date.now().toString(36).toUpperCase(),
      role, name: name.trim(), phone: cleanPhone, passwordHash,
      photo: photo || null, notificationsEnabled: true, createdAt: new Date().toISOString(),
      ...(role === "driver" ? { vehicle: (vehicle || "").trim(), plate: (plate || "").trim().toUpperCase(), online: true } : {}),
    };
    saveAccounts([...accounts, account]);
    writeLS(LS_SESSION, { accountId: account.id });
    return account;
  },
  async login({ role, phone, password }) {
    await apiDelay(700);
    const cleanPhone = normalizePhone(phone);
    const account = getAccounts().find(a => a.role === role && normalizePhone(a.phone) === cleanPhone);
    if (!account) throw new Error("لا يوجد حساب " + (role === "driver" ? "سائق" : "عميل") + " بهذا الرقم");
    const passwordHash = await hashSecret(password);
    if (passwordHash !== account.passwordHash) throw new Error("كلمة المرور غير صحيحة");
    writeLS(LS_SESSION, { accountId: account.id });
    return account;
  },
  async logout() {
    await apiDelay(550); // خروج شعوره حقيقي، لا اختفاء مفاجئ
    writeLS(LS_SESSION, null);
  },
  async updateAccount(id, patch) {
    await apiDelay(650);
    const accounts = getAccounts();
    const idx = accounts.findIndex(a => a.id === id);
    if (idx === -1) throw new Error("تعذّر العثور على الحساب");
    accounts[idx] = { ...accounts[idx], ...patch };
    saveAccounts(accounts);
    return accounts[idx];
  },
  async changePassword(id, currentPassword, newPassword) {
    await apiDelay(700);
    const accounts = getAccounts();
    const idx = accounts.findIndex(a => a.id === id);
    if (idx === -1) throw new Error("تعذّر العثور على الحساب");
    const currentHash = await hashSecret(currentPassword);
    if (currentHash !== accounts[idx].passwordHash) throw new Error("كلمة المرور الحالية غير صحيحة");
    accounts[idx].passwordHash = await hashSecret(newPassword);
    saveAccounts(accounts);
  },
  async deleteAccount(id) {
    await apiDelay(650);
    saveAccounts(getAccounts().filter(a => a.id !== id));
    writeLS(LS_SESSION, null);
  },
  getSession() {
    const s = readLS(LS_SESSION, null);
    if (!s || !s.accountId) return null;
    return getAccounts().find(a => a.id === s.accountId) || null;
  },
  findByPhone(role, phone) {
    const cleanPhone = normalizePhone(phone);
    return getAccounts().find(a => a.role === role && normalizePhone(a.phone) === cleanPhone) || null;
  },
};

function useScrollLock(active) {
  useEffect(() => {
    if (!active) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prev; };
  }, [active]);
}

// ── نظام تتبّع الطلب بالخط الزمني (Timeline) — موحّد بين واجهتَي العميل والسائق ──
// نفس الخطوات، نفس الترتيب، ونفس منطق الحالة تماماً كما في تطبيقات مثل أمازون؛
// يتغيّر فقط نص كل خطوة بحسب من يشاهدها (role="customer" أو role="driver").
const TIMELINE_STEPS = [
  { key:"placed",    icon:Check,       cLabel:"تم تأكيد الطلب",   dLabel:"طلب جديد مستلم"            },
  { key:"assigned",  icon:UserCheck,   cLabel:"تم إسناد سائق",    dLabel:"تم قبول الطلب"              },
  { key:"pickup",    icon:Package,     cLabel:"استلام الشحنة",    dLabel:"استلام الشحنة من الانطلاق"  },
  { key:"transit",   icon:Bike,        cLabel:"في الطريق إليك",   dLabel:"التوجه لنقطة التسليم"       },
  { key:"delivered", icon:CheckCircle, cLabel:"تم التوصيل",       dLabel:"تسليم الطلب"                },
];
const TL_PICKUP_AT = 0.12; // نسبة تقدّم الرحلة التي تُعتبر عندها الشحنة "مستلمة" من نقطة الانطلاق

// فهرس الخطوة الجارية الآن (0-4)، أو -1 إن كان الطلب ملغياً (لا يُعرض له خط زمني)
function currentTimelineStep(order) {
  if (!order || order.status === "cancelled") return -1;
  if (order.status === "delivered") return 4;
  if (order.status === "pending") return 1;      // تم التأكيد، وجارٍ الآن البحث عن سائق
  const p = order.progress || 0;                  // in_transit
  if (p >= 1) return 4;
  if (p >= TL_PICKUP_AT) return 3;                 // في الطريق إلى العميل
  return 2;                                        // جارٍ استلام الشحنة من نقطة الانطلاق
}

function DeliveryTimeline({ order, role = "customer", eta, variant = "full" }) {
  if (!order || order.status === "cancelled") return null;
  const curIdx = currentTimelineStep(order);
  const isDone = order.status === "delivered";
  const stateOf = (i) => isDone ? "done" : i < curIdx ? "done" : i === curIdx ? "current" : "upcoming";

  if (variant === "compact") {
    const activeLabel = isDone ? "تم التوصيل بنجاح 🎉" : (role==="driver" ? TIMELINE_STEPS[curIdx].dLabel : TIMELINE_STEPS[curIdx].cLabel);
    return (
      <div>
        <div className="flex items-center">
          {TIMELINE_STEPS.map((step, i) => {
            const state = stateOf(i);
            const isLast = i === TIMELINE_STEPS.length - 1;
            return (
              <React.Fragment key={step.key}>
                <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 transition-colors duration-300 ${state==="upcoming"?"bg-gray-200":"bg-gray-950"} ${state==="current"?"moter-tl-pulse":""}`}/>
                {!isLast && <div className="flex-1 h-0.5 mx-1 rounded-full transition-colors duration-300" style={{background: state==="done" ? "#0A0A0A" : "var(--bc-b)"}}/>}
              </React.Fragment>
            );
          })}
        </div>
        <p className="text-xs font-bold text-gray-950 mt-2 truncate">{activeLabel}</p>
      </div>
    );
  }

  return (
    <div className="bg-white border rounded-2xl p-5" style={{borderColor:"var(--bc-a)"}} aria-label="تتبع حالة الطلب">
      {TIMELINE_STEPS.map((step, i) => {
        const state = stateOf(i);
        const label = role === "driver" ? step.dLabel : step.cLabel;
        const Ic = state === "done" ? Check : step.icon;
        const isLast = i === TIMELINE_STEPS.length - 1;
        let caption = "";
        if (state === "current") {
          if (step.key === "assigned") caption = "جارٍ البحث عن أقرب سائق متاح...";
          else if (step.key === "pickup") caption = role==="driver" ? "توجّه الآن لاستلام الشحنة" : "السائق في طريقه لاستلام شحنتك...";
          else if (step.key === "transit") caption = eta ? `الوصول المتوقع خلال ~${eta} دقيقة` : "السائق في الطريق الآن...";
        }
        return (
          <div key={step.key} className={`flex gap-3.5 ${isLast?"":"pb-6"}`}>
            <div className="flex flex-col items-center flex-shrink-0">
              <div className={`w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 transition-colors duration-300 ${
                state==="done" ? "bg-gray-950 text-white" : state==="current" ? "bg-gray-950 text-white moter-tl-pulse" : "bg-gray-100 text-gray-300"}`}>
                <Ic size={15} strokeWidth={2.4}/>
              </div>
              {!isLast && <div className="w-0.5 flex-1 rounded-full transition-colors duration-300" style={{minHeight:24, background: state==="done" ? "#0A0A0A" : "var(--bc-b)"}}/>}
            </div>
            <div className="flex-1 min-w-0 pt-1.5">
              <p className={`font-black text-sm ${state==="upcoming" ? "text-gray-300" : "text-gray-950"}`}>{label}</p>
              {caption && <p className="text-gray-400 text-xs mt-1">{caption}</p>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── إدخال كود الخصم مع تحقق حي ────────────────────────────────────────────────
function PromoInput({ orderAmount, onApplied }) {
  const [code, setCode] = useState("");
  const [result, setResult] = useState(null);
  const [checking, setChecking] = useState(false);

  const apply = () => {
    if (!code.trim()) return;
    setChecking(true);
    setTimeout(() => {
      const r = applyPromoCode(orderAmount, code);
      setResult(r);
      setChecking(false);
      onApplied(r.error ? null : { code: code.trim().toUpperCase(), ...r });
    }, 500);
  };

  const clear = () => { setCode(""); setResult(null); onApplied(null); };

  return (
    <div className="bg-white border rounded-2xl p-4" style={{borderColor:"var(--bc-a)"}}>
      <div className="flex items-center gap-2 mb-2">
        <Tag size={15} className="text-gray-400"/>
        <p className="font-bold text-gray-950 text-sm">كود الخصم</p>
      </div>
      {result && !result.error ? (
        <div className="flex items-center justify-between bg-green-50 border border-green-100 rounded-xl p-3">
          <div className="flex items-center gap-2 min-w-0">
            <CheckCircle size={15} className="text-green-600 flex-shrink-0"/>
            <span className="text-green-800 text-sm font-bold truncate">{result.label} • خصم {fmtNum(result.discount)} ج.س</span>
          </div>
          <button onClick={clear} aria-label="إزالة الكود" className="flex-shrink-0"><X size={15} className="text-green-700"/></button>
        </div>
      ) : (
        <div className="flex gap-2">
          <input value={code} onChange={e=>setCode(e.target.value)} placeholder="أدخل الكود هنا" dir="ltr"
            className="flex-1 border-2 rounded-xl px-4 py-2.5 text-sm text-gray-950 font-bold focus:outline-none focus:border-gray-950 transition-colors uppercase" style={{borderColor:"var(--bc-b)"}}/>
          <button onClick={apply} disabled={checking || !code.trim()} className="bg-gray-950 text-white px-5 rounded-xl font-bold text-sm flex items-center gap-1.5 flex-shrink-0">
            {checking && <Spinner/>} تطبيق
          </button>
        </div>
      )}
      {result && result.error && <p className="moter-field-error"><AlertCircle size={13}/> {result.error}</p>}
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen({ role, onAuthed, onBack }) {
  const { t } = useApp();
  const [mode, setMode] = useState("login"); // "login" | "signup"
  const meta = { customer:{label:t("role_customer_title"),Icon:User}, driver:{label:t("role_driver_title"),Icon:Bike} };
  const { label, Icon } = meta[role];

  // ── حقول تسجيل الدخول (رقم الهاتف + كلمة السر) ──
  const [loginPhone, setLoginPhone] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [showLoginPass, setShowLoginPass] = useState(false);
  const [loginErrors, setLoginErrors] = useState({});
  const [loginFormError, setLoginFormError] = useState("");
  const [loginLoading, setLoginLoading] = useState(false);

  const validateLogin = () => {
    const errs = {};
    const phoneTrim = loginPhone.trim().replace(/[\s-]/g, "");
    if (!phoneTrim) errs.phone = t("err_phone_required");
    else if (!/^\+?\d{8,14}$/.test(phoneTrim)) errs.phone = t("err_phone_invalid");
    if (!loginPass) errs.pass = t("err_pass_required");
    else if (loginPass.length < 6) errs.pass = t("err_pass_short");
    setLoginErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const submitLogin = async () => {
    setLoginFormError("");
    if (!validateLogin()) return;
    setLoginLoading(true);
    try {
      const account = await authApi.login({ role, phone: loginPhone, password: loginPass });
      onAuthed(account);
    } catch (e) {
      setLoginFormError(e.message || "تعذّر تسجيل الدخول، حاول مرة أخرى");
    } finally {
      setLoginLoading(false);
    }
  };

  // ── حقول إنشاء الحساب (الاسم + رقم الهاتف + كلمة السر + تأكيدها + صورة + بيانات المركبة للسائق) ──
  const [fullName, setFullName] = useState("");
  const [phone, setPhone] = useState("");
  const [pass, setPass] = useState("");
  const [confirmPass, setConfirmPass] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [showConfirmPass, setShowConfirmPass] = useState(false);
  const [photo, setPhoto] = useState(null);
  const [vehicle, setVehicle] = useState("");
  const [plate, setPlate] = useState("");
  const [signupErrors, setSignupErrors] = useState({});
  const [signupFormError, setSignupFormError] = useState("");
  const [signupLoading, setSignupLoading] = useState(false);
  const photoInputId = "signupPhotoInput_" + role;

  const handlePhoto = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setPhoto(reader.result);
    reader.readAsDataURL(file);
  };

  const validateSignup = () => {
    const errs = {};
    const nameTrim = fullName.trim();
    if (!nameTrim) errs.name = t("err_name_required");
    else if (nameTrim.length < 2) errs.name = t("err_name_short");
    const phoneTrim = phone.trim().replace(/[\s-]/g, "");
    if (!phoneTrim) errs.phone = t("err_phone_required");
    else if (!/^\+?\d{8,14}$/.test(phoneTrim)) errs.phone = t("err_phone_invalid");
    if (!pass) errs.pass = t("err_pass_required");
    else if (pass.length < 6) errs.pass = t("err_pass_short");
    if (!confirmPass) errs.confirmPass = t("err_confirm_pass_required");
    else if (confirmPass !== pass) errs.confirmPass = t("err_confirm_pass_mismatch");
    if (!photo) errs.photo = t("err_photo_required");
    if (role === "driver") {
      if (!vehicle.trim()) errs.vehicle = "الرجاء إدخال نوع المركبة";
      if (!plate.trim()) errs.plate = "الرجاء إدخال رقم لوحة المركبة";
    }
    setSignupErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const submitSignup = async () => {
    setSignupFormError("");
    if (!validateSignup()) return;
    setSignupLoading(true);

      const account = await authApi.register({ role, name: fullName, phone, password: pass, photo, vehicle, plate });

      setSignupFormError(e.message || "تعذّر إنشاء الحساب، حاول مرة أخرى");

      setSignupLoading(false);

        </div>
        <h2 className="text-2xl font-black">{mode === "login" ? t("login_title") : t("signup_title")}</h2>
        <p className="text-gray-400 text-sm mt-1">{t("account_of")} {label}</p>

              style={{borderColor: loginErrors.phone ? "#EF4444" : (loginPhone?"var(--ink)":"var(--bc-b)")}}/>
            {loginErrors.phone && <p className="moter-field-error"><AlertCircle size={13}/> {loginErrors.phone}</p>}

// CUSTOMER APP
// ══════════════════════════════════════════════════════════════════════════════
function CustomerApp({ view, setView, onLogout, onAccountDeleted, currentRole, onSwitchRole }) {
  const { t, orders, addOrder, updateOrder, account, updateProfile, pushNotification } = useApp();
  const profile = account;
  const setProfile = updateProfile;
  const [form, setForm] = useState({ pickup:"", dropoff:"", item:"", notes:"", deliveryType:"parcel", paymentMethod:"cash" });

  const myOrders = useMemo(() => orders.filter(o => o.customerId === profile.id).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)), [orders, profile.id]);
  const activeOrder = myOrders.find(o => o.status === "pending" || o.status === "in_transit") || null;
  const [trackingOrderId, setTrackingOrderId] = useState(() => activeOrder ? activeOrder.id : null);
  const trackingOrder = orders.find(o => o.id === trackingOrderId) || null;

  useEffect(() => {
    if (!trackingOrder || trackingOrder.status !== "in_transit" || view !== "tracking") return;
    const timer = setInterval(() => {
      updateOrder(trackingOrder.id, (o) => {
        const p = Math.min((o.progress || 0) + 0.004, 1);
        if (p >= 1 && o.status !== "delivered") {
          pushNotification("تم توصيل طلبك 🎉", `تم توصيل الطلب ${o.id} بنجاح، لا تنسَ تقييم السائق`);
        }
        return { progress: p, status: p >= 1 ? "delivered" : "in_transit" };
      });
    }, 100);
    return () => clearInterval(timer);
  }, [trackingOrder && trackingOrder.id, trackingOrder && trackingOrder.status, view]);

  const goTrack = (orderId) => { setTrackingOrderId(orderId); setView("tracking"); };

  const navItems = [
    {id:"home",    Icon:Home,    label:t("nav_home")},
    {id:"history", Icon:History, label:t("nav_history")},
    {id:"profile", Icon:User,    label:t("nav_profile")},
  ];

  return (
    <div className="min-h-screen bg-white flex flex-col" dir="rtl">
      <div className="flex-1 overflow-auto pb-20 view-transition" key={view}>
        {view==="home"     && <CHome     setView={setView} profile={profile} activeOrder={activeOrder} setForm={setForm} onTrack={()=>activeOrder && goTrack(activeOrder.id)}/>}
        {view==="form"     && <CForm     setView={setView} form={form} setForm={setForm}/>}
        {view==="preview"  && <CPreview  setView={setView} form={form} profile={profile} orders={orders} addOrder={addOrder} onConfirmed={goTrack}/>}
        {view==="tracking" && <CTracking setView={setView} order={trackingOrder} orders={orders} updateOrder={updateOrder}/>}
        {view==="history"  && <CHistory  orders={myOrders}/>}
        {view==="profile"  && <CProfile  onLogout={onLogout} setView={setView} profile={profile} orderCount={myOrders.length}/>}
        {view==="settings" && <SettingsScreen setView={setView} backTo="profile" profile={profile} setProfile={setProfile} roleLabel={t("role_customer_title")} currentRole={currentRole} onSwitchRole={onSwitchRole} onAccountDeleted={onAccountDeleted}/>}
      </div>
      {["home","history","profile"].includes(view) && (
        <nav className="fixed bottom-0 inset-x-0 bg-white border-t flex" style={{borderColor:"var(--bc-d)", maxWidth:480, margin:"0 auto"}}>
          {navItems.map(({id,Icon:Ic,label}) => (
            <button key={id} onClick={()=>setView(id)} aria-label={label} className={`flex-1 min-w-0 flex flex-col items-center py-3 px-1 gap-1 transition-colors ${view===id?"text-gray-950":"text-gray-300"}`}>
              <Ic size={22} strokeWidth={view===id?2.5:1.5} className="flex-shrink-0"/>
              <span className="w-full text-center truncate text-xs font-semibold">{label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

function CPreview({ setView, form, profile, orders, addOrder, onConfirmed }) {
  const { showToast, pushNotification } = useApp();
  const [loading, setLoading] = useState(false);
  const [promo, setPromo] = useState(null);

  const p = resolveNeighborhood(form.pickup);
  const d = resolveNeighborhood(form.dropoff);
  const distance = Math.max(haversineKm(p, d), 0.6);
  const baseFare = calcDeliveryPrice(distance, form.deliveryType);
  const finalPrice = promo ? promo.finalAmount : baseFare;
  const dtype = DELIVERY_TYPES.find(t=>t.id===form.deliveryType) || DELIVERY_TYPES[0];
  const pmethod = PAYMENT_METHODS.find(pm=>pm.id===form.paymentMethod) || PAYMENT_METHODS[0];
  const busyDriverIds = new Set(orders.filter(o => o.status === "in_transit").map(o => o.driverId));
  const availableCount = getAccounts().filter(a => a.role === "driver" && a.online && !busyDriverIds.has(a.id)).length;

  const confirm = () => {
    setLoading(true);
    setTimeout(() => {
      const pool = getAccounts().filter(a => a.role === "driver" && a.online && !busyDriverIds.has(a.id));
      const assigned = pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
      const now = new Date();
      const newOrder = {
        id: "ORD-" + Date.now().toString().slice(-6),
        date: now.toISOString().slice(0,10),
        time: now.toLocaleTimeString("ar", { hour:"2-digit", minute:"2-digit", numberingSystem:"latn" }),
        customerId: profile.id,
        customer: profile.name,
        customerPhone: profile.phone,
        pickup: form.pickup.trim(),
        dropoff: form.dropoff.trim(),
        item: form.item.trim(),
        deliveryType: form.deliveryType,
        status: assigned ? "in_transit" : "pending",
        price: finalPrice,
        distance: Math.round(distance*10)/10,
        driverId: assigned ? assigned.id : null,
        driver: assigned ? assigned.name : null,
        rating: null,
        paymentMethod: form.paymentMethod,
        promoCode: promo ? promo.code : null,
        progress: 0,
        notes: form.notes || "",
      };
      addOrder(newOrder);
      setLoading(false);
      showToast("تم إنشاء طلبك بنجاح ✅");
      if (assigned) pushNotification("تم إسناد سائق لطلبك", `${assigned.name} في طريقه لاستلام طلبك ${newOrder.id}`);
      else pushNotification("طلبك قيد المعالجة", `جارٍ البحث عن أقرب سائق متاح لطلبك ${newOrder.id}`);
      onConfirmed(newOrder.id);
    }, 900);
  };

  return (
    <div>
      <div className="bg-gray-950 text-white p-5 pt-14">
        <button onClick={()=>setView("form")} className="flex items-center gap-2 text-gray-400 text-sm mb-4">
          <ArrowLeft size={16} style={{transform:"scaleX(-1)"}}/> رجوع
        </button>
        <h2 className="text-xl font-black">تفاصيل الطلب</h2>
      </div>
      <div className="p-5 space-y-4">
        <div className="bg-white border rounded-2xl p-5" style={{borderColor:"var(--bc-a)"}}>
          <div className="flex items-start gap-4 pb-4 border-b" style={{borderColor:"var(--bc-c)"}}>
            <div className="flex flex-col items-center gap-1 mt-1 flex-shrink-0">
              <div className="w-3 h-3 bg-gray-950 rounded-full"/>

function CTracking({ setView, order, orders, updateOrder }) {
  const { showToast } = useApp();
  const [confirmCancel, setConfirmCancel] = useState(false);
  const [rating, setRating] = useState(0);
  const [copied, setCopied] = useState(false);

  if (!order) {
    return (
      <div className="p-5">
        <EmptyState emoji="📦" title="لا يوجد طلب لعرضه" subtitle="عد إلى الرئيسية لإنشاء طلب جديد"
          action={<button onClick={()=>setView("home")} className="mt-4 bg-gray-950 text-white px-6 py-2.5 rounded-xl font-bold text-sm">الرئيسية</button>}/>
      </div>
    );
  }

  const done = order.status === "delivered";
  const cancelled = order.status === "cancelled";
  const progress = order.progress || 0;
  const eta = Math.max(1, Math.round((1-progress)*15));
  const driverAccount = order.driverId ? getAccounts().find(a => a.id === order.driverId) : null;
  const driverRating = order.driverId ? driverStats(order.driverId, orders).rating : null;

  const copyId = () => {
    try { navigator.clipboard.writeText(order.id); } catch (e) {}
    setCopied(true);
    showToast("تم نسخ رقم الطلب");
    setTimeout(()=>setCopied(false), 1500);
  };

  const doCancel = () => {
    updateOrder(order.id, { status:"cancelled" });
    setConfirmCancel(false);
    showToast("تم إلغاء الطلب", "error");
    setView("home");
  };

  const submitRating = (v) => {
    setRating(v);
    updateOrder(order.id, { rating: v });
    showToast("شكراً على تقييمك! ⭐");
  };

  return (
    <div>
      <div className={`text-white p-5 pt-14 transition-colors ${done?"bg-green-800":cancelled?"bg-gray-600":"bg-gray-950"}`}>
        <div className="flex items-center justify-between gap-2">
          <div className="min-w-0">
            <h2 className="text-xl font-black">{done?"تم التوصيل! ✅":cancelled?"تم إلغاء الطلب":"جاري التوصيل"}</h2>
            <button onClick={copyId} className="flex items-center gap-1.5 text-sm mt-1 opacity-60">
              {order.id} <Copy size={12}/> {copied && "✓"}
            </button>
          </div>
          {!done && !cancelled && <div className="text-right flex-shrink-0"><p className="text-3xl font-black">{eta}</p><p className="text-xs opacity-50">دقيقة</p></div>}
        </div>
      </div>
      <div className="p-4 space-y-4">
        {!cancelled && <DeliveryTimeline order={order} role="customer" eta={eta} variant="full"/>}
        {cancelled ? (
          <div className="text-center py-10 bg-white border rounded-2xl" style={{borderColor:"var(--bc-a)"}}>
            <div className="text-5xl mb-4">🚫</div>
            <p className="font-black text-gray-950 text-lg mb-1">تم إلغاء هذا الطلب</p>
            <p className="text-gray-400 text-sm mb-5">يمكنك إنشاء طلب جديد في أي وقت</p>
            <button onClick={()=>setView("home")} className="bg-gray-950 text-white px-8 py-3 rounded-xl font-black">العودة للرئيسية</button>
          </div>
        ) : !done ? (
          <>
            {order.status === "pending" ? (
              <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4 text-center">
                <p className="font-black text-amber-800 text-sm">⏳ جارٍ البحث عن سائق قريب منك...</p>
              </div>
            ) : (
              <div className="bg-white border rounded-2xl p-4 flex items-center gap-3" style={{borderColor:"var(--bc-a)"}}>
                <div className="w-14 h-14 bg-gray-950 text-white rounded-2xl flex items-center justify-center text-2xl font-black flex-shrink-0">{order.driver ? order.driver[0] : "؟"}</div>
                <div className="flex-1 min-w-0">
                  <div className="font-black text-gray-950 truncate">{order.driver || "سائق موتر"}</div>
                  <div className="flex items-center gap-1 mt-0.5">
                    <Star size={12} className="text-amber-400 fill-amber-400"/>
                    <span className="text-sm text-gray-500 truncate">{driverRating != null ? driverRating.toFixed(1) : "5.0"} • {driverAccount ? driverAccount.vehicle : ""}</span>
                  </div>
                </div>
                {driverAccount && (
                  <a href={`tel:${driverAccount.phone.replace(/\s/g,"")}`} className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center flex-shrink-0">
                    <Phone size={17} className="text-gray-700"/>
                  </a>
                )}
              </div>
            )}
            <div className="bg-white border rounded-2xl p-4" style={{borderColor:"var(--bc-a)"}}>
              <div className="flex justify-between text-sm py-1"><span className="text-gray-400">نوع التوصيل</span><span className="font-bold text-gray-950">{(DELIVERY_TYPES.find(t=>t.id===order.deliveryType)||{}).label}</span></div>
              <div className="flex justify-between text-sm py-1"><span className="text-gray-400">طريقة الدفع</span><span className="font-bold text-gray-950">{(PAYMENT_METHODS.find(p=>p.id===order.paymentMethod)||{}).label}</span></div>
              <div className="flex justify-between text-sm py-1"><span className="text-gray-400">المبلغ</span><span className="font-black text-gray-950">{fmtNum(order.price)} ج.س</span></div>
            </div>
            {order.status === "pending" && (
              <button onClick={()=>setConfirmCancel(true)} className="w-full bg-red-50 text-red-600 py-3.5 rounded-xl font-bold text-sm">إلغاء الطلب</button>
            )}
          </>
        ) : (
          <div className="text-center py-6 bg-white border rounded-2xl" style={{borderColor:"var(--bc-a)"}}>
            <div className="text-5xl mb-4">🎉</div>
            <p className="font-black text-gray-950 text-lg mb-1">تم توصيل طلبك!</p>
            <p className="text-gray-400 text-sm mb-5">{order.rating ? "شكراً على تقييمك" : `قيّم تجربتك مع السائق ${order.driver||""}`}</p>
            <div className="flex justify-center gap-2 mb-5">
              {[1,2,3,4,5].map(s=>(
                <button key={s} onClick={()=>submitRating(s)} disabled={!!order.rating} className="text-3xl transition-transform active:scale-110">
                  {s<=(order.rating||rating)?"⭐":"☆"}
                </button>
              ))}
            </div>
            <button onClick={()=>setView("home")} className="bg-gray-950 text-white px-8 py-3 rounded-xl font-black">
              العودة للرئيسية
            </button>
          </div>
        )}
      </div>
      <ConfirmModal
        open={confirmCancel}
        danger
        title="إلغاء الطلب"
        message="هل أنت متأكد من إلغاء هذا الطلب؟"
        confirmLabel="إلغاء الطلب"
        onConfirm={doCancel}
        onCancel={()=>setConfirmCancel(false)}
      />
    </div>
  );
}

// DRIVER APP

function DriverApp({ view, setView, onLogout, onAccountDeleted, currentRole, onSwitchRole }) {
  const { t, orders, updateOrder, account, updateProfile, showToast } = useApp();
  const profile = account;
  const setProfile = updateProfile;
  const [onlineOverride, setOnlineOverride] = useState(null); // تحديث متفائل فوري بينما يُحفظ التغيير الحقيقي
  const online = onlineOverride !== null ? onlineOverride : !!account.online;
  const setOnline = (updater) => {
    const next = typeof updater === "function" ? updater(online) : updater;
    setOnlineOverride(next);
    updateProfile({ online: next })
      .then(() => setOnlineOverride(null))
      .catch(() => { setOnlineOverride(null); showToast("تعذّر تحديث حالة الاتصال", "error"); });
  };

  const pending = orders.filter(o => o.status === "pending");
  const activeOrder = orders.find(o => o.driverId === profile.id && o.status === "in_transit") || null;

  useEffect(() => {
    if (!activeOrder || view !== "active") return;
    const timer = setInterval(() => {
      updateOrder(activeOrder.id, (o) => ({ progress: Math.min((o.progress || 0) + 0.006, 1) }));
    }, 100);
    return () => clearInterval(timer);
  }, [activeOrder && activeOrder.id, view]);

  const navItems = [
    {id:"dashboard", Icon:Home,    label:t("nav_home")},
    {id:"orders",    Icon:Package, label:t("nav_orders")},
    {id:"earnings",  Icon:Wallet,  label:t("nav_earnings")},
    {id:"profile",   Icon:User,    label:t("nav_profile")},
  ];

  return (
    <div className="min-h-screen bg-white flex flex-col" dir="rtl">
      <div className="flex-1 overflow-auto pb-20 view-transition" key={view}>
        {view==="dashboard" && <DDash profile={profile} online={online} setOnline={setOnline} setView={setView} orders={orders} pending={pending} activeOrder={activeOrder}/>}
        {view==="orders"    && <DOrders pending={pending} profile={profile} updateOrder={updateOrder} setView={setView}/>}
        {view==="active"    && <DActive order={activeOrder} setView={setView} updateOrder={updateOrder}/>}
        {view==="earnings"  && <DEarnings profile={profile} orders={orders}/>}
        {view==="profile"   && <DProfile onLogout={onLogout} setView={setView} profile={profile} orders={orders} online={online} setOnline={setOnline}/>}
        {view==="settings"  && <SettingsScreen setView={setView} backTo="profile" profile={profile} setProfile={setProfile} roleLabel={t("role_driver_title")} currentRole={currentRole} onSwitchRole={onSwitchRole} onAccountDeleted={onAccountDeleted}/>}
      </div>
      {["dashboard","orders","earnings","profile"].includes(view) && (
        <nav className="fixed bottom-0 inset-x-0 bg-white border-t flex" style={{borderColor:"var(--bc-d)", maxWidth:480, margin:"0 auto"}}>
          {navItems.map(({id,Icon:Ic,label}) => (
            <button key={id} onClick={()=>setView(id)} aria-label={label} className={`flex-1 min-w-0 flex flex-col items-center py-3 px-1 gap-1 transition-colors ${view===id?"text-gray-950":"text-gray-300"}`}>
              <Ic size={22} strokeWidth={view===id?2.5:1.5} className="flex-shrink-0"/>
              <span className="w-full text-center truncate text-xs font-semibold">{label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

  const s = driverStats(profile.id, orders);
  const todayDeliveries = orders.filter(o => o.driverId===profile.id && o.status==="delivered" && o.date===todayISO());
  const todayEarnings = todayDeliveries.reduce((sum,o)=>sum+o.price,0);
  const recentTrips = orders.filter(o=>o.driverId===profile.id && o.status==="delivered")
    .sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,3);

  return (
    <div>
      <div className={`text-white p-5 pt-14 transition-colors duration-500 ${online?"bg-gray-950":"bg-gray-600"}`}>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h1 className="text-xl font-black">{profile.name}</h1>
            <div className="flex items-center gap-2 mt-0.5">
              <div className={`w-2 h-2 rounded-full ${online?"bg-green-400":"bg-gray-400"}`}/>
              <span className="text-sm opacity-60">{online?"متصل ونشط":"غير متصل"}</span>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <NotificationBell variant="dark"/>
            <button onClick={()=>setOnline(v=>!v)} aria-label={online?"إيقاف الاتصال":"تفعيل الاتصال"} aria-pressed={online}
              className={`relative w-16 h-8 rounded-full flex-shrink-0 transition-colors ${online?"bg-green-500":"bg-gray-700"}`}>
              <div className={`absolute top-1 w-6 h-6 bg-white rounded-full shadow-md transition-all duration-300 ${online?"left-9":"left-1"}`}/>
            </button>
          </div>

function DOrders({ pending, profile, updateOrder, setView }) {
  const { t, showToast, pushNotification } = useApp();
  const [query, setQuery] = useState("");
  const [acceptingId, setAcceptingId] = useState(null);
  const q = query.trim().toLowerCase();
  const shown = q ? pending.filter(o => o.item.toLowerCase().includes(q) || o.pickup.toLowerCase().includes(q) || o.dropoff.toLowerCase().includes(q)) : pending;

  const accept = (o) => {
    setAcceptingId(o.id);
    setTimeout(() => {
      updateOrder(o.id, { driverId: profile.id, driver: profile.name, status:"in_transit", progress:0 });
      showToast(`تم قبول الطلب ${o.id}`);
      pushNotification("تم إسناد سائق لطلبك", `${profile.name} في طريقه لاستلام طلبك ${o.id}`);

    <div>
      <div className="bg-gray-950 text-white p-5 pt-14">
        <h2 className="text-xl font-black">الطلبات المتاحة</h2>

        <div className="relative">
          <SearchIcon size={16} className="absolute top-1/2 -translate-y-1/2 right-4 text-gray-300"/>

            aria-label={t("search_ph_orders")}
            className="w-full border-2 rounded-xl pr-11 pl-4 py-2.5 text-sm text-gray-950 placeholder-gray-300 focus:outline-none focus:border-gray-950 transition-colors" style={{borderColor:"var(--bc-b)"}}/>
        </div>
      </div>
      {shown.length === 0 && (
        <EmptyState emoji="🏍️" title={query ? t("no_results_title") : t("no_pending_orders_title")}
          subtitle={query ? t("no_results_orders") : t("no_pending_orders_sub")}
          action={query && <button onClick={()=>setQuery("")} className="mt-4 text-sm font-bold text-gray-950 underline">{t("clear_search")}</button>}/>
      )}
      <div className="p-4 space-y-4">
        {shown.map(o=>{
          const dtype = DELIVERY_TYPES.find(dt=>dt.id===o.deliveryType);
          const pmethod = PAYMENT_METHODS.find(p=>p.id===o.paymentMethod);

          <div key={o.id} className="bg-white border-2 rounded-2xl overflow-hidden" style={{borderColor:"var(--bc-a)"}}>
            <div className="p-4">
              <div className="flex justify-between items-start gap-3 mb-3">
                <div className="min-w-0 flex-1">

                  <p className="text-gray-400 text-xs truncate">{dtype?dtype.emoji+" ":""}{o.item}</p>
                </div>
                <div className="text-left flex-shrink-0">
                  <p className="text-2xl font-black text-gray-950 whitespace-nowrap">{o.price}</p>
                  <p className="text-xs text-gray-400 whitespace-nowrap">جنيه سوداني</p>
                </div>
              </div>
              <div className="space-y-2.5 py-3 border-y" style={{borderColor:"var(--bc-c)"}}>
                <div className="flex items-center gap-2.5 min-w-0">
                  <div className="w-2.5 h-2.5 bg-gray-950 rounded-full flex-shrink-0"/>
                  <p className="text-sm font-semibold text-gray-950 truncate min-w-0">{o.pickup}</p>
                </div>
                <div className="flex items-center gap-2.5 min-w-0">
                  <div className="w-2.5 h-2.5 bg-gray-400 rounded-sm flex-shrink-0"/>

              <button onClick={()=>accept(o)} disabled={acceptingId===o.id}

function DActive({ order, setView, updateOrder }) {
  const { showToast } = useApp();

  if (!order) {
    return (
      <div className="p-5">
        <EmptyState emoji="🏍️" title="لا توجد توصيلة جارية" subtitle="اقبل طلباً من قائمة الطلبات المتاحة"
          action={<button onClick={()=>setView("orders")} className="mt-4 bg-gray-950 text-white px-6 py-2.5 rounded-xl font-bold text-sm">الطلبات المتاحة</button>}/>
      </div>
    );
  }

  const progress = order.progress || 0;
  const done = progress >= 1;
  const eta = Math.max(1, Math.round((1-progress)*15));
  const canFinish = progress >= 0.85;

  const openNavigation = () => {
    const dest = resolveNeighborhood(order.dropoff);
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${dest.lat},${dest.lng}`, "_blank");
  };

  const finish = () => {
    updateOrder(order.id, { status:"delivered", progress:1 });
    showToast("تم تسليم الطلب بنجاح ✅");
    setView("dashboard");
  };

  return (
    <div>
      <div className={`text-white p-5 pt-14 transition-colors ${done?"bg-green-800":"bg-gray-950"}`}>
        <div className="flex justify-between items-start">
          <div className="min-w-0">
            <p className="text-sm opacity-60">جاري توصيل</p>
            <h2 className="text-xl font-black truncate">{order.id}</h2>
          </div>
          <div className="text-left flex-shrink-0">
            <p className="text-3xl font-black">{done?"✓":eta}</p>
            <p className="text-xs opacity-50">{done?"اكتمل":"دقيقة"}</p>
          </div>
        </div>
      </div>
      <div className="p-4 space-y-4">
        <DeliveryTimeline order={order} role="driver" eta={eta} variant="full"/>
        <div className="bg-white border rounded-2xl p-4" style={{borderColor:"var(--bc-a)"}}>
          <div className="flex items-center gap-3 mb-3">
            <div className="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center font-black text-gray-950 text-xl flex-shrink-0">
              {order.customer[0]}
            </div>
            <div className="flex-1 min-w-0">
              <p className="font-black text-gray-950 truncate">{order.customer}</p>
              <p className="text-gray-400 text-sm truncate">{order.item}</p>
            </div>
            <a href={`tel:${(order.customerPhone||"").replace(/\s/g,"")}`} className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center flex-shrink-0">
              <Phone size={17} className="text-gray-700"/>
            </a>
          </div>
          <div className="grid grid-cols-2 gap-2 text-sm">
            {[["الاستلام",order.pickup],["التسليم",order.dropoff]].map(([k,v])=>(
              <div key={k} className="bg-gray-50 rounded-xl p-3 min-w-0">
                <p className="text-gray-400 text-xs">{k}</p>
                <p className="font-bold text-gray-950 truncate">{v}</p>
              </div>
            ))}
          </div>
        </div>
        {done ? (
          <button onClick={finish} className="w-full bg-green-600 text-white py-4 rounded-xl font-black text-base active:scale-95 transition-transform">
            ✓ تأكيد إتمام التوصيل
          </button>
        ) : (
          <>
            <div className="grid grid-cols-2 gap-3">
              <a href="tel:+249900000000" className="bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
                <Phone size={14}/> الدعم الفني
              </a>
              <button onClick={openNavigation} className="bg-gray-950 text-white py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2">
                <Navigation size={15}/> التنقل
              </button>
            </div>
            <button onClick={finish} disabled={!canFinish}
              className="w-full bg-green-500 text-white py-3.5 rounded-xl font-black text-sm active:scale-95 transition-transform">
              {canFinish ? "تأكيد التسليم ✅" : `اقترب من الوجهة... ${Math.round(progress*100)}%`}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function DEarnings({ profile, orders }) {
  const { showToast } = useApp();
  const [withdrawOpen, setWithdrawOpen] = useState(false);
  const [withdrawals, setWithdrawals] = useLocalStorageState(LS_WITHDRAWALS, []);
  const [destination, setDestination] = useState("bankak");

  const mine = orders.filter(o => o.driverId === profile.id && o.status === "delivered");
  const s = driverStats(profile.id, orders);

  const dayLabels = ["أحد","اثن","ثلا","أرب","خمس","جمع","سبت"];
  const weekTotals = [0,0,0,0,0,0,0];
  mine.forEach(o => { const day = new Date(o.date + "T00:00:00").getDay(); weekTotals[day] += o.price; });
  const todayIdx = new Date(todayISO() + "T00:00:00").getDay();
  const weekSum = weekTotals.reduce((a,b)=>a+b,0);
  const todaySum = mine.filter(o=>o.date===todayISO()).reduce((a,o)=>a+o.price,0);

  const myWithdrawals = withdrawals.filter(w => w.driverId === profile.id);
  const totalWithdrawn = myWithdrawals.reduce((sum,w)=>sum+w.amount,0);
  const available = Math.max(s.earnings - totalWithdrawn, 0);

  const confirmWithdraw = () => {
    const w = { id:"WD-"+Date.now().toString().slice(-6), driverId: profile.id, amount: available, destination, date: todayISO() };
    setWithdrawals(ws => [w, ...ws]);
    setWithdrawOpen(false);
    showToast(`تم إرسال طلب سحب ${fmtNum(available)} ج.س بنجاح`);
  };

  return (
    <div>
      <div className="bg-gray-950 text-white p-5 pt-14">
        <h2 className="text-xl font-black">أرباحي</h2>
        <div className="mt-4">
          <p className="text-4xl font-black">{fmtNum(weekSum)}</p>
          <p className="text-gray-400 text-sm mt-0.5">جنيه سوداني هذا الأسبوع</p>
        </div>
      </div>
      <div className="p-5 space-y-4">
        <div className="bg-white border rounded-2xl p-5" style={{borderColor:"var(--bc-a)"}}>
          <p className="text-gray-400 text-xs mb-1">الرصيد المتاح للسحب</p>
          <p className="text-3xl font-black text-gray-950 mb-4">{fmtNum(available)} ج.س</p>
          <button onClick={()=>setWithdrawOpen(true)} disabled={available<=0}
            className="w-full bg-gray-950 text-white py-3.5 rounded-xl font-black text-sm flex items-center justify-center gap-2">
            <ArrowDownCircle size={16}/> طلب سحب الأرباح
          </button>
        </div>
        <div className="bg-white border rounded-2xl p-5" style={{borderColor:"var(--bc-a)"}}>
          <p className="font-black text-gray-950 mb-4">الأرباح اليومية</p>
          <MiniBarChart labels={dayLabels} values={weekTotals} highlightIndex={todayIdx}/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          {[["إجمالي الأرباح",`${fmtNum(s.earnings)} ج.س`],["هذا الأسبوع",`${fmtNum(weekSum)} ج.س`],["اليوم",`${fmtNum(todaySum)} ج.س`],["تقييمي",`${s.rating.toFixed(1)} ★`]].map(([l,v])=>(
            <div key={l} className="bg-gray-50 rounded-2xl p-4">
              <p className="text-gray-400 text-xs mb-1">{l}</p>
              <p className="font-black text-gray-950">{v}</p>
            </div>
          ))}
        </div>
        <div className="bg-white border rounded-2xl p-4" style={{borderColor:"var(--bc-a)"}}>
          <p className="font-black text-gray-950 mb-3">إجمالي الرحلات</p>
          {[["رحلات اليوم", mine.filter(o=>o.date===todayISO()).length],["إجمالي الرحلات", s.deliveries]].map(([l,v])=>(
            <div key={l} className="flex justify-between py-2.5 border-b last:border-0 text-sm" style={{borderColor:"var(--bc-c)"}}>
              <span className="text-gray-500">{l}</span>
              <span className="font-black text-gray-950">{v}</span>
            </div>
          ))}
        </div>
        <div className="bg-white border rounded-2xl overflow-hidden" style={{borderColor:"var(--bc-a)"}}>
          <div className="px-5 py-4 border-b" style={{borderColor:"var(--bc-c)"}}><p className="font-black text-gray-950">آخر التوصيلات</p></div>
          {mine.length === 0 ? (
            <p className="text-gray-300 text-sm text-center py-8">لا توجد توصيلات مكتملة بعد</p>
          ) : mine.slice().sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,6).map((o,i,arr)=>(
            <div key={o.id} className={`px-5 py-4 flex items-center justify-between gap-2 ${i<arr.length-1?"border-b":""}`} style={{borderColor:"var(--bc-e)"}}>
              <div className="min-w-0">
                <p className="font-bold text-gray-950 text-sm truncate">{o.pickup} ← {o.dropoff}</p>
                <p className="text-gray-400 text-xs">{o.date} • {o.time}</p>
              </div>
              <span className="font-black text-gray-950 text-sm flex-shrink-0">+{o.price} ج.س</span>
            </div>
          ))}
        </div>
      </div>
      {withdrawOpen && (
        <div className="fixed inset-0 z-50 flex items-end justify-center px-4 pb-4 sm:items-center sm:pb-0" style={{background:"rgba(10,10,10,0.55)"}} onClick={()=>setWithdrawOpen(false)}>
          <div className="w-full bg-white rounded-3xl p-5" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <h3 className="font-black text-gray-950 mb-4">طلب سحب الأرباح</h3>
            <p className="text-gray-400 text-sm mb-1">المبلغ المتاح</p>
            <p className="text-2xl font-black text-gray-950 mb-4">{fmtNum(available)} ج.س</p>
            <p className="text-sm font-bold text-gray-700 mb-2">وجهة التحويل</p>
            <div className="space-y-2 mb-5">
              {[["bankak","بنكك (Bankak)"],["bank","حساب بنكي"]].map(([id,label])=>(
                <button key={id} onClick={()=>setDestination(id)}
                  className={`w-full p-3.5 rounded-xl border-2 text-right font-bold text-sm ${destination===id?"border-gray-950 bg-gray-50":"bg-white"}`}
                  style={destination!==id?{borderColor:"var(--bc-b)"}:{}}>
                  {label}
                </button>
              ))}
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={()=>setWithdrawOpen(false)} className="py-3.5 rounded-xl bg-gray-100 text-gray-700 font-bold text-sm">إلغاء</button>
              <button onClick={confirmWithdraw} className="py-3.5 rounded-xl bg-gray-950 text-white font-bold text-sm">تأكيد السحب</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  );
}

// ══════════════════════════════════════════════════════════════════════════════
// CONFIRM MODAL — نافذة تأكيد موحّدة لكل إجراءات الحذف/الخروج/الحفظ الحساسة
// ══════════════════════════════════════════════════════════════════════════════
function ConfirmModal({ open, title, message, confirmLabel, cancelLabel, danger, loading, loadingLabel, onConfirm, onCancel }) {
  useScrollLock(open);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center px-4 pb-4 sm:items-center sm:pb-0" style={{background:"rgba(10,10,10,0.55)"}}>
      <div className="w-full bg-white rounded-3xl p-6" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mb-4 ${danger?"bg-red-50":"bg-gray-100"}`}>
          <AlertCircle size={22} className={danger?"text-red-500":"text-gray-700"}/>
        </div>
        <h3 className="font-black text-lg text-gray-950 mb-1.5">{title}</h3>
        <p className="text-gray-500 text-sm mb-6 leading-relaxed">{message}</p>
        <div className="flex gap-3">
          <button onClick={onCancel} disabled={loading} className="flex-1 py-3.5 rounded-xl font-bold text-gray-700 bg-gray-100 active:scale-95 transition-transform disabled:opacity-40">{cancelLabel || "إلغاء"}</button>
          <button onClick={onConfirm} disabled={loading} className={`flex-1 py-3.5 rounded-xl font-black text-white active:scale-95 transition-transform flex items-center justify-center gap-2 disabled:opacity-70 ${danger?"bg-red-500":"bg-gray-950"}`}>
            {loading && <Spinner/>}
            {loading ? (loadingLabel || "جارٍ التنفيذ...") : (confirmLabel || "تأكيد")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
function RoleSwitcher({ current, onSwitch }) {
  const roles = [
    { r:"customer", Icon:User, label:"عميل" },
    { r:"driver",   Icon:Bike, label:"سائق" },

      <p className="text-xs text-gray-400 mb-4">إن كان لديك حساب آخر بنفس رقم الهاتف سننتقل إليه مباشرة، وإلا سنوجّهك لإنشاء واحد</p>
